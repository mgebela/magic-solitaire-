# Development — PostgreSQL only (use with npm run db:up)
services:
  postgres:
    image: postgres:16-alpine
    container_name: three-towers-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: three_towers
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d three_towers']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
